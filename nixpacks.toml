[phases.setup]
nixPkgs = ["nodejs_20"]

[phases.install]
cmds = [
  "pip install -r requirements.txt",
  "cd theme/static_src && npm install"
]

[phases.build]
cmds = [
  "python manage.py tailwind build --no-input",
  "python manage.py collectstatic --no-input"
]

[start]
cmd = "python manage.py migrate --noinput && python manage.py create_admin && gunicorn config.wsgi:application --workers 2 --bind 0.0.0.0:$PORT"