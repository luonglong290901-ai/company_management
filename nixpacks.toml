[phases.setup]
nixPkgs = ["nodejs_20"]

[phases.install]
cmds = [
  "pip install -r requirements.txt",
  "cd theme/static_src && npm install"
]

[phases.build]
cmds = [
  "python manage.py tailwind build --no-input",
  "python manage.py collectstatic --no-input"
]

[start]
cmd = "python manage.py migrate --noinput && python manage.py shell -c \"import os; from django.contrib.auth import get_user_model; U=get_user_model(); username=os.environ.get('DJANGO_SUPERUSER_USERNAME'); email=os.environ.get('DJANGO_SUPERUSER_EMAIL',''); password=os.environ.get('DJANGO_SUPERUSER_PASSWORD'); assert username and password, 'Missing DJANGO_SUPERUSER_USERNAME or DJANGO_SUPERUSER_PASSWORD'; user, created = U.objects.get_or_create(username=username, defaults={'email': email, 'is_staff': True, 'is_superuser': True, 'is_active': True}); user.email = email or user.email; user.is_staff = True; user.is_superuser = True; user.is_active = True; user.set_password(password); user.save(); print('Superuser ready:', username, 'created=' + str(created))\" && gunicorn config.wsgi:application --workers 2 --bind 0.0.0.0:$PORT"