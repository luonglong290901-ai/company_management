{% extends 'base.html' %}

{% block content %}
    <div class="max-w-lg mx-auto bg-white rounded-xl p-4 lg:p-6 shadow-sm border border-slate-200">
        <h2 class="text-xl lg:text-2xl font-bold text-black mb-3">Confirm Delete License Record</h2>
        <p class="mb-4 text-black text-sm lg:text-base">
            Bạn có chắc muốn xóa license <strong>{{ object.product_name }}</strong> của công ty <strong>{{ company.company_name }}</strong> không?
        </p>
        <form method="post">
            {% csrf_token %}
            <div class="flex flex-col sm:flex-row gap-2">
                <button type="submit" class="px-4 py-2 bg-red-600 text-white rounded-lg hover:bg-red-700 text-sm lg:text-base">Yes, delete license record</button>
                <a href="{% url 'company_detail' company.pk %}" class="px-4 py-2 border border-slate-300 rounded-lg text-black text-sm lg:text-base text-center">Cancel</a>
            </div>
        </form>
    </div>
{% endblock %}
