{% load tailwind_tags %}
<!doctype html>
<html lang="vi">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Login | Dashboard</title>
    {% tailwind_css %}
  </head>
  <body class="bg-slate-100 flex items-center justify-center min-h-screen p-4">
    <div class="bg-white p-6 lg:p-10 rounded-xl shadow-xl w-full max-w-md">
      <div class="flex items-center justify-center gap-2 mb-6 lg:mb-8 text-[#4F46E5]">
        <svg class="w-6 h-6 lg:w-8 lg:h-8" fill="currentColor" viewBox="0 0 24 24">
          <path d="M12 2L4.5 20.29l.71.71L12 18l6.79 3 .71-.71z" />
        </svg>
        <span class="text-xl lg:text-2xl font-bold text-black">Dashboard</span>
      </div>

      <form method="POST" action="{% url 'login' %}">
        {% csrf_token %}
        
        {% if form.errors %}
        <div class="mb-4 p-3 bg-red-100 border border-red-400 text-red-700 rounded">
          <p class="font-bold">Lỗi đăng nhập:</p>
          <ul class="list-disc list-inside">
            {% for field, errors in form.errors.items %}
              {% for error in errors %}
                <li>{{ error }}</li>
              {% endfor %}
            {% endfor %}
          </ul>
        </div>
        {% endif %}
        
        {% if next %}
        <input type="hidden" name="next" value="{{ next }}" />
        {% endif %}
        
        <div class="mb-4">
          <label class="block text-sm font-medium text-black"
            >Username</label
          >
          <input
            type="text"
            name="username"
            value="{{ form.username.value|default:'' }}"
            required
            class="w-full mt-1 p-2 border rounded-md focus:ring-2 focus:ring-indigo-500 outline-none text-black"
          />
        </div>

        <div class="mb-4 lg:mb-6">
          <label class="block text-sm font-medium text-black"
            >Password</label
          >
          <div class="relative">
            <input
              id="passwordInput"
              type="password"
              name="password"
              required
              class="w-full mt-1 p-2 pr-10 border rounded-md focus:ring-2 focus:ring-indigo-500 outline-none text-black"
            />
            <button
              type="button"
              id="togglePassword"
              class="absolute right-3 top-1/2 transform -translate-y-1/2 text-slate-500 hover:text-slate-700 focus:outline-none"
              aria-label="Toggle password visibility"
            >
              <svg id="eyeIcon" class="w-5 h-5" fill="none" stroke="currentColor" viewBox="0 0 24 24">
                <path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M15 12a3 3 0 11-6 0 3 3 0 016 0z"></path>
                <path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M2.458 12C3.732 7.943 7.523 5 12 5c4.478 0 8.268 2.943 9.542 7-1.274 4.057-5.064 7-9.542 7-4.477 0-8.268-2.943-9.542-7z"></path>
              </svg>
            </button>
          </div>
        </div>

        <button
          id="submitBtn"
          type="submit"
          class="w-full bg-indigo-600 text-white py-2 px-4 rounded-md hover:bg-indigo-700 transition text-sm lg:text-base flex items-center justify-center gap-2"
        >
          <span id="btnText">Sign in</span>
          <svg id="btnSpinner" class="hidden w-4 h-4 animate-spin" fill="none" stroke="currentColor" viewBox="0 0 24 24">
            <circle class="opacity-25" cx="12" cy="12" r="10" stroke="currentColor" stroke-width="4"></circle>
            <path class="opacity-75" fill="currentColor" d="M4 12a8 8 0 018-8V0C5.373 0 0 5.373 0 12h4zm2 5.291A7.962 7.962 0 014 12H0c0 3.042 1.135 5.824 3 7.938l3-2.647z"></path>
          </svg>
        </button>
      </form>
    </div>

    <script>
      // Toggle password visibility
      const passwordInput = document.getElementById('passwordInput');
      const togglePasswordBtn = document.getElementById('togglePassword');
      const eyeIcon = document.getElementById('eyeIcon');

      togglePasswordBtn.addEventListener('click', function() {
        const isPassword = passwordInput.type === 'password';
        
        if (isPassword) {
          passwordInput.type = 'text';
          eyeIcon.innerHTML = '<path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M13.875 18.825A10.05 10.05 0 0112 19c-4.478 0-8.268-2.943-9.543-7a9.97 9.97 0 011.563-4.803m5.596-3.856a3.375 3.375 0 11-4.753 4.753m4.753-4.753L3.596 3.039m10.5 13.5h7.128M7.08 7.08l2.828 2.829m0 0l-2.83 2.829"></path>';
        } else {
          passwordInput.type = 'password';
          eyeIcon.innerHTML = '<path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M15 12a3 3 0 11-6 0 3 3 0 016 0z"></path><path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M2.458 12C3.732 7.943 7.523 5 12 5c4.478 0 8.268 2.943 9.542 7-1.274 4.057-5.064 7-9.542 7-4.477 0-8.268-2.943-9.542-7z"></path>';
        }
      });

      // Handle form submission - show loading state
      const form = document.querySelector('form');
      const submitBtn = document.getElementById('submitBtn');
      const btnText = document.getElementById('btnText');
      const btnSpinner = document.getElementById('btnSpinner');

      form.addEventListener('submit', function() {
        submitBtn.disabled = true;
        btnText.classList.add('hidden');
        btnSpinner.classList.remove('hidden');
      });
    </script>
  </body>
</html>
